name: Deploy to GKE

on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for Google Workload Identity Federation
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GCP_REGION }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ vars.GKE_CLUSTER_ZONE }}
  REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  IMAGE: tradex-terminal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Auth
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

    - name: Build, Tag, and Push Image to Artifact Registry
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:$IMAGE_TAG .
        docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:$IMAGE_TAG

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Create Kubernetes Secrets
      run: |
        kubectl create secret generic tradex-secrets \
          --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
          --from-literal=VAULT_MASTER_KEY="${{ secrets.VAULT_MASTER_KEY }}" \
          --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
          --from-literal=BINANCE_API_KEY="${{ secrets.BINANCE_API_KEY }}" \
          --from-literal=BINANCE_API_SECRET="${{ secrets.BINANCE_API_SECRET }}" \
          --from-literal=APP_URL="${{ vars.APP_URL }}" \
          --from-literal=REDIS_URL="${{ vars.REDIS_URL }}" \
          --from-literal=QUESTDB_HOST="${{ vars.QUESTDB_HOST }}" \
          --from-literal=STREAM_SYMBOLS="${{ vars.STREAM_SYMBOLS }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to Kubernetes
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Replace the image tag in the deployment manifest
        sed -i "s|image: tradex-terminal:latest|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:$IMAGE_TAG|g" k8s/deployment.yaml
        kubectl apply -f k8s/
