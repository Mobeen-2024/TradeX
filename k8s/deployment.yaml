apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradex-terminal
  labels:
    app: tradex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tradex
  template:
    metadata:
      labels:
        app: tradex
    spec:
      containers:
      - name: tradex
        image: tradex-terminal:latest # To be updated by CI/CD
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: NODE_ENV
          value: "production"
        envFrom:
        - secretRef:
            name: tradex-secrets
        # WebSocket affinity / stability
        readinessProbe:
          httpGet:
            path: /api/positions
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/positions
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
