apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradex-ingress
  annotations:
    # Important for WebSockets: ensure timeouts are high
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # AWS Load Balancer specific annotations if using ALB Ingress Controller
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradex-service
            port:
              number: 80
